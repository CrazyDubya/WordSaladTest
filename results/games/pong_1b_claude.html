  <script>
    let canvas = document.getElementById('game-container');
    let ctx = canvas.getContext('2d');
    let paddle1 = document.querySelector('.paddle');
    let paddle2 = document.querySelector('.paddle');
    let ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      vx: 5,
      vy: 5,
      diameter: 20
    };
    let score1 = 0;
    let score2 = 0;
    let ballSpeed = 5;
    let serve = false;
    let reset = false;
    let interval = null;
    let audioContext = new AudioContext();
    let oscillator = audioContext.createOscillator();
    let gain = audioContext.createGain();
    let frequency = 440;
    let volume = 0.5;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath();
      ctx.rect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'black';
      ctx.stroke();
      ctx.beginPath();
      ctx.rect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'black';
      ctx.stroke();
      ctx.font = '24px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`Score: ${score1} - ${score2}`, canvas.width / 2, canvas.height / 2);
      ctx.font = '36px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`Serve: ${serve ? 'Serve' : 'Hit'}`, canvas.width / 2, canvas.height / 2);
      if (score1 > score2) {
        ctx.font = '48px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('You win!', canvas.width / 2, canvas.height / 2);
      } else if (score2 > score1) {
        ctx.font = '48px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('CPU wins!', canvas.width / 2, canvas.height / 2);
      }
    }

    function update() {
      if (serve && !reset) {
        if (Math.random() < 0.1) {
          ball.x -= ballSpeed;
          if (ball.x < 0) {
            ball.x = canvas.width;
            ball.vx = -ball.vx;
          }
        }
        if (Math.random() < 0.1) {
          ball.y += ballSpeed;
          if (ball.y > canvas.height) {
            ball.y = 0;
            ball.vx = -ball.vx;
          }
        }
        if (ball.x < paddle1.x + paddle1.width && ball.y > paddle1.y && ball.y < paddle1.y + paddle1.height) {
          ball.x = paddle1.x + paddle1.width / 2;
          ball.y = paddle1.y + paddle1.height / 2;
          ball.vx = -ball.vx;
          serve = false;
        }
        if (ball.y < paddle2.y + paddle2.height) {
          ball.y = paddle2.y + paddle2.height / 2;
          ball.vx = -ball.vx;
        }
        if (ball.y > canvas.height - paddle2.y - paddle2.height) {
          ball.y = canvas.height - paddle2.y - paddle2.height;
          ball.vx = -ball.vx;
        }
      }
      if (Math.random() < 0.05) {
        if (Math.random() < 0.5) {
          ball.x += Math.random() * 5 - 2.5;
          if (ball.x < 0) {
            ball.x = canvas.width;
            ball.vx = -ball.vx;
          }
        } else {
          ball.y += Math.random() * 5 - 2.5;
          if (ball.y < 0) {
            ball.y = canvas.height;
            ball.vx = -ball.vx;
          }
        }
      }
      if (ball.x < paddle1.x) {
        ball.x = paddle1.x;
        ball.vx = -ball.vx;
      } else if (ball.x > paddle1.x + paddle1.width) {
        ball.x = paddle1.x + paddle1.width;
        ball.vx = -ball.vx;
      }
      if (ball.y < paddle2.y) {
        ball.y = paddle2.y;
        ball.vx = -ball.vx;
      } else if (ball.y > paddle2.y + paddle2.height) {
        ball.y = paddle2.y + paddle2.height;
        ball.vx = -ball.vx;
      }
      if (ball.x < canvas.width / 2) {
        score2++;
        interval = setInterval(() => {
          draw();
        }, 16);
      }
      if (ball.x > canvas.width / 2) {
        score1++;
        interval = setInterval(() => {
          draw();
        }, 16);
      }
      if (Math.random() < 0.1) {
        reset = true;
        interval = null;
      }
    }

    function handleKey(event) {
      if (event.key === 'ArrowUp') {
        paddle1.y -= 10;
      } else if (event.key === 'ArrowDown') {
        paddle1.y += 10;
      }
    }
