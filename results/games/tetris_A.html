<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #game-container {
            width: 400px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #game-canvas {
            border: 1px solid black;
        }
        #next-piece-canvas {
            border: 1px solid black;
            margin-top: 20px;
        }
        #score-display {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
        #level-display {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="200" height="400"></canvas>
        <canvas id="next-piece-canvas" width="100" height="100"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="level-display">Level: 1</div>
    </div>
    <script>
        const gameCanvas = document.getElementById('game-canvas');
        const nextPieceCanvas = document.getElementById('next-piece-canvas');
        const scoreDisplay = document.getElementById('score-display');
        const levelDisplay = document.getElementById('level-display');

        const tetrominoes = [
            // I-piece
            [
                [1, 1, 1, 1]
            ],
            // J-piece
            [
                [1, 0, 0],
                [1, 1, 1]
            ],
            // L-piece
            [
                [0, 0, 1],
                [1, 1, 1]
            ],
            // O-piece
            [
                [1, 1],
                [1, 1]
            ],
            // S-piece
            [
                [0, 1, 1],
                [1, 1, 0]
            ],
            // T-piece
            [
                [0, 1, 0],
                [1, 1, 1]
            ],
            // Z-piece
            [
                [1, 1, 0],
                [0, 1, 1]
            ]
        ];

        const colors = [
            'red',
            'blue',
            'green',
            'yellow',
            'orange',
            'purple',
            'pink'
        ];

        let score = 0;
        let level = 1;
        let currentPiece = null;
        let nextPiece = null;
        let gameGrid = [];
        let pieceX = 0;
        let pieceY = 0;
        let pieceRotation = 0;

        function initGame() {
            for (let i = 0; i < 20; i++) {
                gameGrid.push([]);
                for (let j = 0; j < 10; j++) {
                    gameGrid[i].push(0);
                }
            }
            spawnNewPiece();
            drawGameGrid();
            drawNextPiece();
            updateScoreDisplay();
            updateLevelDisplay();
            setInterval(updateGame, 1000 / level);
        }

        function spawnNewPiece() {
            if (nextPiece === null) {
                nextPiece = tetrominoes[Math.floor(Math.random() * tetrominoes.length)];
            }
            currentPiece = nextPiece;
            nextPiece = tetrominoes[Math.floor(Math.random() * tetrominoes.length)];
            pieceX = 3;
            pieceY = 0;
            pieceRotation = 0;
        }

        function drawGameGrid() {
            const ctx = gameCanvas.getContext('2d');
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            for (let i = 0; i < 20; i++) {
                for (let j = 0; j < 10; j++) {
                    if (gameGrid[i][j] !== 0) {
                        ctx.fillStyle = colors[gameGrid[i][j] - 1];
                        ctx.fillRect(j * 20, i * 20, 20, 20);
                    }
                }
            }
            if (currentPiece !== null) {
                const piece = rotatePiece(currentPiece, pieceRotation);
                for (let i = 0; i < piece.length; i++) {
                    for (let j = 0; j < piece[i].length; j++) {
                        if (piece[i][j] === 1) {
                            ctx.fillStyle = colors[tetrominoes.indexOf(currentPiece)];
                            ctx.fillRect((j + pieceX) * 20, (i + pieceY) * 20, 20, 20);
                        }
                    }
                }
            }
        }

        function drawNextPiece() {
            const ctx = nextPieceCanvas.getContext('2d');
            ctx.clearRect(0, 0, nextPieceCanvas.width, nextPieceCanvas.height);
            const piece = nextPiece;
            for (let i = 0; i < piece.length; i++) {
                for (let j = 0; j < piece[i].length; j++) {
                    if (piece[i][j] === 1) {
                        ctx.fillStyle = colors[tetrominoes.indexOf(nextPiece)];
                        ctx.fillRect(j * 20, i * 20, 20, 20);
                    }
                }
            }
        }

        function updateScoreDisplay() {
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function updateLevelDisplay() {
            levelDisplay.innerText = `Level: ${level}`;
        }

        function rotatePiece(piece, rotation) {
            if (rotation === 0) {
                return piece;
            } else if (rotation === 1) {
                return transposeAndReverse(piece);
            } else if (rotation === 2) {
                return rotatePiece(rotatePiece(piece, 1), 1);
            } else if (rotation === 3) {
                return rotatePiece(rotatePiece(rotatePiece(piece, 1), 1), 1);
            }
        }

        function transposeAndReverse(piece) {
            const transposed = [];
            for (let i = 0; i < piece[0].length; i++) {
                transposed.push([]);
                for (let j = 0; j < piece.length; j++) {
                    transposed[i].push(piece[j][i]);
                }
            }
            return transposed.reverse();
        }

        function updateGame() {
            if (canMoveDown()) {
                pieceY++;
            } else {
                freezePiece();
                checkForLineClears();
                spawnNewPiece();
            }
            drawGameGrid();
        }

        function canMoveDown() {
            const piece = rotatePiece(currentPiece, pieceRotation);
            for (let i = 0; i < piece.length; i++) {
                for (let j = 0; j < piece[i].length; j++) {
                    if (piece[i][j] === 1) {
                        if (i + pieceY + 1 >= 20 || gameGrid[i + pieceY + 1][j + pieceX] !== 0) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function freezePiece() {
            const piece = rotatePiece(currentPiece, pieceRotation);
            for (let i = 0; i < piece.length; i++) {
                for (let j = 0; j < piece[i].length; j++) {
                    if (piece[i][j] === 1) {
                        gameGrid[i + pieceY][j + pieceX] = tetrominoes.indexOf(currentPiece) + 1;
                    }
                }
            }
        }

        function checkForLineClears() {
            let linesCleared = 0;
            for (let i = 0; i < 20; i++) {
                let isFullLine = true;
                for (let j = 0; j < 10; j++) {
                    if (gameGrid[i][j] === 0) {
                        isFullLine = false;
                        break;
                    }
                }
                if (isFullLine) {
                    linesCleared++;
                    gameGrid.splice(i, 1);
                    gameGrid.unshift([]);
                    for (let j = 0; j < 10; j++) {
                        gameGrid[0].push(0);
                    }
                }
            }
            if (linesCleared > 0) {
                score += linesCleared * linesCleared * 100;
                updateScoreDisplay();
                if (score >= level * 1000) {
                    level++;
                    updateLevelDisplay();
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                if (canMoveLeft()) {
                    pieceX--;
                    drawGameGrid();
                }
            } else if (e.key === 'ArrowRight') {
                if (canMoveRight()) {
                    pieceX++;
                    drawGameGrid();
                }
            } else if (e.key === 'ArrowDown') {
                if (canMoveDown()) {
                    pieceY++;
                    drawGameGrid();
                }
            } else if (e.key === 'ArrowUp') {
                pieceRotation = (pieceRotation + 1) % 4;
                drawGameGrid();
            }
        });

        function canMoveLeft() {
            const piece = rotatePiece(currentPiece, pieceRotation);
            for (let i = 0; i < piece.length; i++) {
                for (let j = 0; j < piece[i].length; j++) {
                    if (piece[i][j] === 1) {
                        if (j + pieceX - 1 < 0 || gameGrid[i + pieceY][j + pieceX - 1] !== 0) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function canMoveRight() {
            const piece = rotatePiece(currentPiece, pieceRotation);
            for (let i = 0; i < piece.length; i++) {
                for (let j = 0; j < piece[i].length; j++) {
                    if (piece[i][j] === 1) {
                        if (j + pieceX + 1 >= 10 || gameGrid[i + pieceY][j + pieceX + 1] !== 0) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        initGame();
    </script>
</body>
</html>
