<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        /* Add some retro flair */
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        
        #game-container {
            width: 400px;
            height: 400px;
            border: 1px solid #000;
            margin: 40px auto;
            position: relative;
        }
        
        #score {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        #controls {
            margin-bottom: 20px;
        }
        
        #controls button {
            width: 100px;
            height: 50px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="400" height="400"></canvas>
        <div id="score">Score: 0</div>
        <div id="controls">
            <button id="left-control">Left</button>
            <button id="right-control">Right</button>
        </div>
    </div>

    <script>
        // Get the canvas element
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        // Set up the game variables
        let score = 0;
        let playerX = 200;
        let cpuX = 200;
        let playerSpeed = 5;
        let cpuSpeed = 5;
        let ballX = 200;
        let ballY = 200;
        let ballSpeedX = 5;
        let ballSpeedY = 5;
        let isGameRunning = false;

        // Define the keyboard controls
        document.getElementById('left-control').addEventListener('click', () => {
            if (isGameRunning) {
                playerX -= playerSpeed;
            }
        });

        document.getElementById('right-control').addEventListener('click', () => {
            if (isGameRunning) {
                playerX += playerSpeed;
            }
        });

        // Main game loop
        function update() {
            if (isGameRunning) {
                // Move the ball
                ballX += ballSpeedX;
                ballY += ballSpeedY;

                // Collision with the top and bottom of the screen
                if (ballY <= 0 || ballY >= 400) {
                    ballSpeedY *= -1;
                }

                // Collision with the left and right of the screen
                if (ballX <= 0) {
                    cpuX += cpuSpeed;
                    score++;
                } else if (ballX >= 400) {
                    cpuX -= cpuSpeed;
                    score++;
                }

                // Collision with the player
                if (ballY >= playerY && ballX >= playerX && ballX <= playerX + 20) {
                    ballSpeedX *= -1;
                }

                // Collision with the CPU
                if (ballY >= cpuY && ballX >= cpuX && ballX <= cpuX + 20) {
                    ballSpeedX *= -1;
                }

                // Draw everything
                ctx.clearRect(0, 0, 400, 400);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 400, 400);

                ctx.fillStyle = '#ff0';
                ctx.fillRect(playerX, playerY, 20, 20);

                ctx.fillStyle = '#0ff';
                ctx.fillRect(cpuX, cpuY, 20, 20);

                ctx.fillStyle = '#ff0';
                ctx.fillRect(ballX, ballY, 10, 10);

                ctx.font = '24px Arial';
                ctx.fillStyle = '#000';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(`Score: ${score}`, 10, 10);

                requestAnimationFrame(update);
            }
        }

        // Start the game
        function startGame() {
            isGameRunning = true;
            update();
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                playerY -= 20;
            } else if (e.key === 'ArrowRight') {
                playerY += 20;
            }
        });

        // Add some retro flair
        function addRetroFlair() {
            ctx.font = '24px Arial';
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('Pong Game', 200, 10);
        }

        // Add some zen clarity
        function addZenClarity() {
            ctx.fillStyle = '#0ff';
            ctx.fillRect(200, 200, 20, 20);
        }

        // Add some sonorous beeps
        function addSonorousBeeps() {
            ctx.fillStyle = '#000';
            ctx.fillRect(200, 200, 20, 20);
            ctx.fillStyle = '#ff0';
            ctx.fillRect(200, 200, 20, 20);
        }

        // Launch the game
        startGame();

        // Add some seasonal arcade crawl flair
        setInterval(() => {
            addRetroFlair();
            addZenClarity();
            addSonorousBeeps();
        }, 1000);
    </script>
</body>
</html>
