<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        let paddle1 = {
            x: 50,
            y: 200,
            width: 10,
            height: 100,
            speed: 5
        };

        let paddle2 = {
            x: 780 - paddle1.x,
            y: 200,
            width: 10,
            height: 100,
            speed: 5
        };

        let ball = {
            x: 400,
            y: 200,
            width: 10,
            height: 10,
            speed: 5
        };

        let score1 = 0;
        let score2 = 0;

        let game = {
            score1: 0,
            score2: 0,
            paddle1Y: 200,
            paddle2Y: 200,
            ballX: 400,
            ballY: 200,
            ballSpeedX: 5,
            ballSpeedY: -5
        };

        let gameLoop = function() {
            requestAnimationFrame(gameLoop);

            // Move paddle 1
            if (keyIsDown(87)) {
                paddle1.y -= paddle1.speed;
            }
            if (keyIsDown(83)) {
                paddle1.y += paddle1.speed;
            }

            // Move paddle 2
            if (keyIsDown(68)) {
                paddle2.y -= paddle2.speed;
            }
            if (keyIsDown(65)) {
                paddle2.y += paddle2.speed;
            }

            // Move ball
            ball.x += ballSpeedX;
            ball.y += ballSpeedY;

            // Collision with paddle 1
            if (ball.y < paddle1.y + paddle1.height &&
                ball.y + ball.height > paddle1.y &&
                ball.x > paddle1.x &&
                ball.x < paddle1.x + paddle1.width) {
                ballSpeedY *= -1;
            }

            // Collision with paddle 2
            if (ball.y < paddle2.y + paddle2.height &&
                ball.y + ball.height > paddle2.y &&
                ball.x > paddle2.x &&
                ball.x < paddle2.x + paddle2.width) {
                ballSpeedY *= -1;
            }

            // Collision with top and bottom
            if (ball.y < 0) {
                score2++;
                ball.x = 400;
                ball.y = 200;
                ballSpeedX *= -1;
            }
            if (ball.y > 400) {
                score1++;
                ball.x = 400;
                ball.y = 200;
                ballSpeedX *= -1;
            }

            // Collision with left and right
            if (ball.x < 0) {
                score2++;
                ball.x = 400;
                ball.y = 200;
                ballSpeedX *= -1;
            }
            if (ball.x > 780) {
                score1++;
                ball.x = 400;
                ball.y = 200;
                ballSpeedX *= -1;
            }

            // Draw paddles
            ctx.clearRect(0, 0, 800, 400);
            ctx.fillStyle = "black";
            ctx.fillRect(50, paddle1.y - 10, paddle1.width, paddle1.height + 10);
            ctx.fillRect(780 - paddle2.x + 10, paddle2.y - 10, paddle2.width, paddle2.height + 10);

            // Draw ball
            ctx.fillStyle = "black";
            ctx.fillRect(ball.x, ball.y, ball.width, ball.height);

            // Draw scores
            ctx.font = "24px Arial";
            ctx.fillStyle = "black";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(score1, 100, 50);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(score2, 580, 50);

            // Draw game over screen
            if (score1 >= 10) {
                ctx.font = "64px Arial";
                ctx.fillStyle = "black";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("Player 1 wins!", 300, 200);
            } else if (score2 >= 10) {
                ctx.font = "64px Arial";
                ctx.fillStyle = "black";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("Player 2 wins!", 300, 200);
            } else {
                ctx.font = "48px Arial";
                ctx.fillStyle = "black";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("Press space to play again", 300, 200);
            }
        }

        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowUp") {
                paddle1.y -= 5;
            }
            if (event.key === "ArrowDown") {
                paddle1.y += 5;
            }
            if (event.key === "ArrowLeft") {
                paddle2.y -= 5;
            }
            if (event.key === "ArrowRight") {
                paddle2.y += 5;
            }
        });

        document.addEventListener("keyup", function(event) {
            if (event.key === "ArrowUp") {
                paddle1.y = 200;
            }
            if (event.key === "ArrowDown") {
                paddle1.y = 200;
            }
            if (event.key === "ArrowLeft") {
                paddle2.y = 200;
            }
            if (event.key === "ArrowRight") {
                paddle2.y = 200;
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
