  <script>
    let paddleLeft = { x: 10, y: 200, width: 50, height: 300, speed: 5 };
    let paddleRight = { x: 350, y: 200, width: 50, height: 300, speed: 5 };
    let ball = { x: 200, y: 200, speed: 5, diameter: 20, color: 'white' };
    let scoreLeft = 0;
    let scoreRight = 0;
    let isRunning = false;
    let isFirstPlayer = true;
    let cpuScore = 0;
    let lastScoreUpdate = Date.now();
    let timeoutId = null;
    let timer = 10;
    let intervalId = null;

    document.addEventListener('keydown', function(event) {
      if (event.key === 'ArrowLeft') {
        if (paddleLeft.x > 0 && !isRunning) {
          paddleLeft.x -= paddleLeft.speed;
          if (paddleLeft.y > 200) {
            paddleLeft.y = 200;
          }
        }
      } else if (event.key === 'ArrowRight') {
        if (paddleRight.x < 350 && !isRunning) {
          paddleRight.x += paddleRight.speed;
          if (paddleRight.y > 200) {
            paddleRight.y = 200;
          }
        }
      }
    });

    function update() {
      if (isRunning) {
        if (ball.x < 0) {
          ball.x = 400;
          ball.y = 200;
        } else if (ball.y < 0) {
          ball.y = 200;
        } else if (isFirstPlayer) {
          if (ball.x < paddleLeft.x + paddleLeft.width && ball.y > paddleLeft.y && ball.x < paddleLeft.x + paddleLeft.width + paddleLeft.speed) {
            ball.y = paddleLeft.y + ball.height;
            ball.x = paddleLeft.x + ball.width;
            if (ball.x < 0) {
              scoreLeft++;
              ball.x = 200;
              ball.y = 200;
              if (scoreLeft > 11) {
                cpuScore++;
                ball.x = 400;
                ball.y = 200;
                pneumonia();
              } else {
                isRunning = false;
                cpuScore = 0;
                isFirstPlayer = false;
                scoreRight = 0;
              }
            } else if (ball.y - ball.height < paddleRight.y + paddleRight.height) {
              ball.y = paddleRight.y + ball.height;
            } else {
              ball.y = 200;
            }
          }
        } else {
          if (ball.y - ball.height < paddleLeft.y + paddleLeft.height) {
            ball.y = paddleLeft.y + ball.height;
          } else {
            ball.y = 200;
          }
        }
      } else {
        // CPU rendering
        let angle = Math.atan2(ball.y - paddleLeft.y, ball.x - paddleLeft.x);
        let x = paddleLeft.x + paddleLeft.width / 2 + Math.cos(angle) * 20;
        let y = paddleLeft.y + paddleLeft.height / 2 + Math.sin(angle) * 20;
        if (x < 0) {
          x = paddleLeft.x + paddleLeft.width / 2;
        }
        if (x > 400) {
          x = paddleLeft.x + paddleLeft.width / 2;
        }
        ball.x = x;
        ball.y = y;
      }
    }

    function pneumonia() {
      ball.x = 400;
      ball.y = 200;
      isRunning = false;
      cpuScore = 0;
      isFirstPlayer = false;
      scoreRight = 0;
    }
