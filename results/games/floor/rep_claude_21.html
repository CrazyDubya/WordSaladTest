<!DOCTYPE html>
<html>
<head>
	<title>Pong Game</title>
	<style>
		/* Minimalist design */
		body {
			resolution: 640px;
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
			background-color: #f0f0f0;
		}

		.game-container {
			width: 400px;
			height: 400px;
			border: 1px solid #ccc;
			border-radius: 10px;
			background-color: #fff;
			position: relative;
			margin: 20px auto;
		}

		.paddle {
			width: 20px;
			height: 100px;
			background-color: #000;
			position: absolute;
			top: 50%;
			transform: translateY(-50%);
			z-index: 1;
		}

		.ball {
			width: 20px;
			height: 20px;
			background-color: #000;
			position: absolute;
			top: 50%;
			transform: translateY(-50%);
			width: 100%;
			height: 100%;
			border-radius: 50%;
			pointer-events: none;
			transition: transform 0.5s ease-in-out;
		}

		.paddle1 {
			left: 10px;
		}

		.paddle2 {
			right: 10px;
		}

		.left-paddle {
			left: 40px;
		}

		.right-paddle {
			right: 40px;
		}

		.score {
			position: absolute;
			top: 10px;
			font-size: 24px;
			color: #ff0000;
			font-weight: bold;
		}

		.time {
			position: absolute;
			top: 10px;
			font-size: 20px;
			color: #ff0000;
			font-weight: bold;
		}

		.score1, .score2 {
			font-size: 24px;
		}

		.game-over {
			position: absolute;
			top: 10px;
			left: 10px;
			font-size: 24px;
			color: #ff0000;
			font-weight: bold;
			font-family: monospace;
		}

		.start-game {
			position: absolute;
			top: 10px;
			left: 10px;
			font-size: 24px;
			color: #000;
			font-weight: bold;
		}

		.start-game:hover {
			background-color: #000;
		}

		.replay {
			position: absolute;
			top: 10px;
			left: 10px;
			font-size: 24px;
			color: #000;
			font-weight: bold;
		}

		.replay:hover {
			background-color: #000;
		}

		.clock {
			position: absolute;
			top: 10px;
			left: 10px;
			font-size: 24px;
			color: #000;
			font-weight: bold;
		}
	</style>
</head>
<body>
	<div class="game-container">
		<div class="paddle1" style="left: 10px;"></div>
		<div class="paddle2" style="right: 10px;"></div>
		<div class="score">Score: <span class="score1">0</span> vs <span class="score2">0</span></div>
		<div class="clock">Time: <span class="time">00:00</span></div>
		<div class="start-game">Start Game</div>
		<div class="replay">Replay</div>
		<div class="left-paddle"></div>
		<div class="right-paddle"></div>
		<div class="ball"></div>
		<div class="score1"></div>
		<div class="score2"></div>
		<div class="game-over">Game Over</div>
		<div class="clock"></div>
		<div class="start-game" id="start-game-btn">
			<button id="start-btn">Start</button>
		</div>
		<div class="replay" id="replay-btn">
			<button id="replay-btn">Replay</button>
		</div>

		<script>
			let paddle1 = document.querySelector('.paddle1');
			let paddle2 = document.querySelector('.paddle2');
			let ball = document.querySelector('.ball');
			let score1 = document.querySelector('.score1');
			let score2 = document.querySelector('.score2');
			let startGameBtn = document.querySelector('#start-game-btn');
			let replayBtn = document.querySelector('#replay-btn');
			let time = document.querySelector('#time');
			let clock = document.querySelector('#clock');
			let startBtn = document.querySelector('#start-btn');
			let replayBtn = document.querySelector('#replay-btn');

			document.addEventListener('click', function(e) {
				if (e.target.classList.contains('paddle')) {
					let x = e.clientX - paddle1.offsetLeft;
					let y = e.clientY - paddle1.offsetTop;
					let dx = (x - 10) / 2;
					let dy = y;

					paddle1.style.left = x + 'px';
					paddle2.style.left = x + dx + 'px';

					paddle1.style.top = y + 'px';
					paddle2.style.top = y + dy + 'px';
				}
			});

			startGameBtn.addEventListener('click', function() {
				startGame();
			});

			replayBtn.addEventListener('click', function() {
				restartGame();
			});

			function startGame() {
				score1.textContent = 0;
				score2.textContent = 0;
				ball.style.left = '10px';
				ball.style.top = '10px';
				ball.src = 'https://i.imgur.com/5Ljw5ZJ.png';
				ball.style.width = '20px';
				ball.style.height = '20px';
				ball.style.borderRadius = '50%';
				ball.style.backgroundColor = 'red';
				ball.style.transform = 'rotate(0deg)';
				ball.style.transformOrigin = 'center';
				ball.style.left = '10px';
				ball.style.top = '10px';
				startTime = new Date();
				clock.textContent = '00:00';
				clock.style.top = '10px';
				document.body.classList.add('game-over');

				paddle1.textContent = 'Player 1';
				paddle2.textContent = 'Player 2';

				paddle1.style.left = '10px';
				paddle2.style.left = '10px';
				paddle1.style.top = '10px';
				paddle2.style.top = '10px';
			}

			function restartGame() {
				startTime = new Date();
				clock.textContent = '00:00';
				clock.style.top = '10px';
				document.body.classList.remove('game-over');
				paddle1.textContent = 'Player 1';
				paddle2.textContent = 'Player 2';
				ball.style.left = '50px';
				ball.style.top = '50px';
				ball.src = 'https://i.imgur.com/5Ljw5ZJ.png';
				ball.style.width = '20px';
				ball.style.height = '20px';
				ball.style.borderRadius = '50%';
				ball.style.backgroundColor = 'red';
				ball.style.transform = 'rotate(0deg)';
				ball.style.transformOrigin = 'center';
				ball.style.left = '50px';
				ball.style.top = '50px';
				startTime = new Date();
				startTime = new Date();
			}

			function updateScore() {
				let currentTime = new Date();
				let diff = (currentTime - startTime) / 1000;
				let seconds = Math.floor(diff);
				let minutes = Math.floor((diff / 1000) % 60);
				let hours = Math.floor((diff / 3600) % 24);
				let milliseconds = Math.floor(diff % 1000);
				let interval = 16; // 1 second = 16 milliseconds

				score1.textContent = seconds + ':' + minutes + ':' + hours;
				score2.textContent = '0:00';
				if (seconds > 0 || minutes > 0) {
					if (seconds > 10) {
						score2.textContent = '10:00';
					} else {
						score2.textContent = '0:' + (10 - seconds);
					}
				}

				if (score1 > score2) {
					document.body.classList.add('score1', 'win');
				} else if (score2 > score1) {
					document.body.classList.add('score2', 'win');
				} else {
					document.body.classList.remove('win');
				}
			}

			function drawBall() {
				let canvas = document.createElement('canvas');
				let ctx = canvas.getContext('2d');
				ctx.fillStyle = 'white';
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				ctx.fillStyle = 'black';
				ctx.beginPath();
				ctx.arc(200, 200, 50, 0, 2 * Math.PI);
				ctx.fill();
				ctx.fillStyle = 'red';
				ctx.beginPath();
				ctx.arc(200, 200, 25, 0, 2 * Math.PI);
				ctx.fill();
				ctx.fillStyle = 'black';
				ctx.beginPath();
				ctx.arc(200, 200, 20, 0, 2 * Math.PI);
				ctx.fill();

				let ballX = 200;
				let ballY = 200;
				let ballSpeedX = 2;
				let ballSpeedY = 2;

				let timeElapsed = 0;
				let interval = 16;

				let startTime = new Date();
				let diff = (startTime - time) / 1000;
				let seconds = Math.floor(diff);
				let minutes = Math.floor((diff / 1000) % 60);
				let hours = Math.floor((diff / 3600) % 24);
				let milliseconds = Math.floor(diff % 1000);
				let intervalTime = 16; // 1 second = 16 milliseconds

				while(true) {
					timeElapsed += interval;
					if (timeElapsed >= 60) {
						timeElapsed -= 60;
						diff = (startTime - time) / 1000;
						seconds = Math.floor(diff);
						minutes = Math.floor((diff / 1000) % 60);
						hours = Math.floor((diff / 3600) % 24);
						milliseconds = Math.floor(diff % 1000);
						intervalTime = 16; // 1 second = 16 milliseconds

						score1.textContent = seconds + ':' + minutes + ':' + hours;
						score2.textContent = '0:00';
						if (seconds > 0 || minutes > 0) {
							if (seconds > 10) {
								score2.textContent = '10:00';
							} else {
								score2.textContent = '0:' + (10 - seconds);
							}
						}

						if (score1 > score2) {
							document.body.classList.add('score1', 'win');
						} else if (score2 > score1) {
							document.body.classList.add('score2', 'win');
						} else {
							document.body.classList.remove('win');
						}
						break;
					}

					ballX += ballSpeedX;
					ballY += ballSpeedY;

					if (ballX < 0) {
						ballX = 200;
						ballSpeedX = -ballSpeedX;
					} else if (ballX > 320) {
						ballX = 320;
						ballSpeedX = -ballSpeedX;
					}

					if (ballY < 0) {
						ballY = 200;
						ballSpeedY = -ballSpeedY;
					} else if (ballY > 320) {
						ballY = 320;
						ballSpeedY = -ballSpeedY;
					}

					ctx.fillStyle = 'red';
					ctx.beginPath();
					ctx.arc(ballX, ballY, 10, 0, 2 * Math.PI);
					ctx.fill();
					ctx.fillStyle = 'black';
					ctx.beginPath();
					ctx.arc(ballX, ballY, 5, 0, 2 * Math.PI);
					ctx.fill();
					ctx.fillStyle = 'black';
					ctx.beginPath();
					ctx.arc(ballX, ballY + 10, 5, 0, 2 * Math.PI);
				(ctx.fill());

					ctx.fillStyle = 'white';
					ctx.beginPath();
					ctx.arc(200, 200, 20, 0, 2 * Math.PI);
					ctx.fill();
					ctx.beginPath();
					ctx.arc(200, 200, 20, 0, 2 * Math.PI);
					ctx.fill();

					ctx.fillStyle = 'black';
					ctx.beginPath();
					ctx.arc(200, 200, 20, 0, 2 * Math.PI);
					ctx.fill();

					if (ballX < paddle1.offsetLeft + paddle1.offsetWidth / 2 && ballY > paddle1.offsetTop - paddle1.offsetHeight / 2 && ballY < paddle1.offsetTop + paddle1.offsetHeight / 2) {
						ballX = paddle1.offsetLeft + paddle1.offsetWidth / 2;
						ballY = paddle1.offsetTop - paddle1.offsetHeight / 2;
					}

					if (ballX < paddle2.offsetLeft + paddle2.offsetWidth / 2 && ballY > paddle2.offsetTop - paddle2.offsetHeight / 2 && ballY < paddle2.offsetTop + paddle2.offsetHeight / 2) {
						ballX = paddle2.offsetLeft + paddle2.offsetWidth / 2;
						ballY = paddle2.offsetTop - paddle2.offsetHeight / 2;
					}

					if (paddle1.style.left === ballX && paddle1.style.top === ballY) {
						if (ballY < paddle1.offsetTop) {
							ballY = paddle1.offsetTop;
						} else {
							ballY = paddle1.offsetTop + paddle1.offsetHeight / 2;
						}
					}

					if (paddle2.style.left === ballX && paddle2.style.top === ballY) {
						if (ballY < paddle2.offsetTop) {
							ballY = paddle2.offsetTop;
						} else {
							ballY = paddle2.offsetTop + paddle2.offsetHeight / 2;
						}
					}

					if (ballX < paddle1.offsetLeft + paddle1.offsetWidth / 2 && ballY > paddle1.offsetTop - paddle1.offsetHeight / 2 && ballY < paddle1.offsetTop + paddle1.offsetHeight / 2) {
						ballX = paddle1.offsetLeft + paddle1.offsetWidth / 2;
						ballY = paddle1.offsetTop - paddle1.offsetHeight / 2;
					}

					if (ballX > paddle2.offsetLeft + paddle2.offsetWidth / 2 && ballY > paddle2.offsetTop - paddle2.offsetHeight / 2 && ballY < paddle2.offsetTop + paddle2.offsetHeight / 2) {
						ballX = paddle2.offsetLeft + paddle2.offsetWidth / 2;
						ballY = paddle2.offsetTop - paddle2.offsetHeight / 2;
					}

					if (paddle1.style.left === ballX && paddle2.style.left === ballX) {
						if (ballY < paddle1.offsetTop) {
							ballY = paddle1.offsetTop;
						} else {
							ballY = paddle1.offsetTop + paddle1.offsetHeight / 2;
						}
					}

					if (paddle2.style.left === ballX && paddle1.style.left === ballX) {
						if (ballY < paddle2.offsetTop) {
							ballY = paddle2.offsetTop;
						} else {
							ballY = paddle2.offsetTop + paddle2.offsetHeight / 2;
						}

					}

					if (Math.abs(ballX - paddle1.offsetLeft) < 10 && Math.abs(ballY - paddle1.offsetTop) < 10) {
						updateScore();
					} else if (Math.abs(ballX - paddle2.offsetLeft) < 10 && Math.abs(ballY - paddle2.offsetTop) < 10) {
						updateScore();
					}
					}
				}

				// Vertical repeat
				if (Math.abs(ballX - paddle1.offsetLeft) < 10 && Math.abs(ballY - paddle1.offsetTop) < 10) {
					updateScore();
				} else if (Math.abs(ballX - paddle2.offsetLeft) < 10 && Math.abs(ballY - paddle2.offsetTop) < 10) {
					updateScore();
				}
			}

			function drawClock() {
				let ctx = document.createElement('canvas');
				ctx.fillStyle = 'black';
				ctx.fillRect(300, 10, 20, 50);
				ctx.fillStyle = 'black';
				ctx.beginPath();
				ctx.arc(150, 150, 20, 0, 2 * Math.PI);
				ctx.fill();
				ctx.beginPath();
				ctx.arc(150, 150, 20, 0, 2 * Math.PI);
				ctx.fill();
				ctx.beginPath();
				ctx.arc(150, 150, 20, 0, 2 * Math.PI);
				ctx.fill();
				ctx.fillStyle = 'black';
				ctx.beginPath();
				ctx.arc(150, 150, 20, 0, 2 * Math.PI);
				ctx.fill();
			}

			startGameBtn.addEventListener('click', startGame);
			replayBtn.addEventListener('click', function() {
				restartGame();
			});
		</script>
</body>
</html>
