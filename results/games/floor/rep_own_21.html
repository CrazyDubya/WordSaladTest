<!DOCTYPE html>
<html>
<head>
	<title>Pong Game</title>
	<style>
		/* Global Styles */
		body {
			background-color: #f0f0f0;
		}
		
		/* Pong Game Styles */
		#game-container {
			width: 800px;
			margin: 40px auto;
			background-color: #333;
			border: 1px solid #777;
			padding: 20px;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
		}
		
		/* Game Elements */
		#score-1 {
			font-size: 24px;
			margin-bottom: 20px;
		}
		
		#score-2 {
			font-size: 24px;
			margin-bottom: 20px;
		}
		
		#score-3 {
			font-size: 24px;
			margin-bottom: 20px;
		}
		
		#high-score-1 {
			font-size: 24px;
			margin-bottom: 20px;
		}
		
		#high-score-2 {
			font-size: 24px;
			margin-bottom: 20px;
		}
		
		#high-score-3 {
			font-size: 24px;
			margin-bottom: 20px;
		}
		
		#reset-button {
			margin-top: 20px;
			background-color: #4CAF50;
			color: #fff;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}
		
		#reset-button:hover {
			background-color: #3e8e41;
		}
		
		/* Game Controls */
		#controls {
			margin-top: 20px;
			text-align: center;
		}
		
		#controls input[type="text"] {
			width: 50%;
			height: 30px;
			margin-bottom: 10px;
			padding: 10px;
			border: 1px solid #777;
		}
		
		#controls button {
			width: 20%;
			height: 30px;
			margin: 10px auto;
			padding: 10px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}
		
		#controls button:hover {
			background-color: #4CAF50;
		}
	</style>
</head>

					gameOverInterval = setInterval(updateGameOver, 1000);

				if (score2 > 0 && player1X > 390) {
