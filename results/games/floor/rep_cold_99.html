<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        canvas {
            border: 1px solid black;
        }
        #score {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let player = {
            x: 100,
            y: 200,
            vx: 2,
            vy: 2
        };
        let cpu = {
            x: 400,
            y: 200,
            vx: -2,
            vy: 2
        };
        let score = {
            player: 0,
            cpu: 0
        };

        let playerSPEED = 5;
        let cpuSPEED = 3;
        let ball = {
            x: 400,
            y: 200,
            vx: cpuSPEED,
            vy: -cpuSPEED
        };

        let clock = setInterval(() => {
            draw();
            let input = window.event;
            if (input.type === "keydown" && input.key === "ArrowUp") {
                player.y -= 5;
            } else if (input.type === "keyup" && input.key === "ArrowUp") {
                player.y += 5;
            }
            if (input.type === "keydown" && input.key === "ArrowDown") {
                player.y += 5;
            } else if (input.type === "keyup" && input.key === "ArrowDown") {
                player.y -= 5;
            }
            if (input.type === "keydown" && input.key === "ArrowLeft") {
                player.x -= 5;
            } else if (input.type === "keyup" && input.key === "ArrowLeft") {
                player.x += 5;
            }
            if (input.type === "keydown" && input.key === "ArrowRight") {
                player.x += 5;
            } else if (input.type === "keyup" && input.key === "ArrowRight") {
                player.x -= 5;
            }
            if (player.x < 0) {
                player.x = 0;
            }
            if (player.x > 790) {
                player.x = 790;
            }
            if (player.y < 0) {
                player.y = 0;
            }
            if (player.y > 390) {
                player.y = 390;
            }
            if (ball.x < 0) {
                cpu.score++;
                ball.x = 400;
                ball.y = 200;
            } else if (ball.x > 790) {
                cpu.score++;
                ball.x = 400;
                ball.y = 200;
            }
            if (ball.y < 0) {
                cpu.score++;
                ball.x = 400;
                ball.y = 200;
            } else if (ball.y > 390) {
                cpu.score++;
                ball.x = 400;
                ball.y = 200;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "24px Arial";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.fillText(`Player: ${score.player}`, 10, 10);
            ctx.fillText(`CPU: ${score.cpu}`, canvas.width - 120, 10);
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, 10, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, 10, 0, 2 * Math.PI);
            ctx.fill();
            ctx.font = "24px Arial";
            ctx.fillStyle = "black";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.fillText(`${ball.x} vs ${ball.y}`, 10, 30);
            ctx.font = "24px Arial";
            ctx.fillStyle = "black";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.fillText(`${cpu.x} vs ${cpu.y}`, canvas.width - 120, 30);
            if (player.x - player.vx > 0) {
                if (Math.abs(ball.x - player.x) < 10) {
                    ball.x += player.vx;
                }
            } else if (player.x - player.vx < 0) {
                if (Math.abs(ball.x - player.x) > 10) {
                    ball.x -= player.vx;
                }
            }
            if (player.y - player.vy > 0) {
                if (Math.abs(ball.y - player.y) < 10) {
                    player.vy -= player.vy;
                }
            } else if (player.y - player.vy < 0) {
                if (Math.abs(ball.y - player.y) > 10) {
                    player.vy += player.vy;
                }
            }
            if (cpu.x - cpu.vx > 0) {
                if (Math.abs(ball.x - cpu.x) < 10) {
                    cpu.vy -= cpu.vy;
                }
            } else if (cpu.x - cpu.vx < 0) {
                if (Math.abs(ball.x - cpu.x) > 10) {
                    cpu.vy += cpu.vy;
                }
            }
            if (cpu.y - cpu.vy > 0) {
                if (Math.abs(ball.y - cpu.y) < 10) {
                    cpu.vy -= cpu.vy;
                }
            } else if (cpu.y - cpu.vy < 0) {
                if (Math.abs(ball.y - cpu.y) > 10) {
                    cpu.vy += cpu.vy;
                }
            }
            ctx.font = "24px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "black";
            ctx.fillText(`Player: ${score.player}`, canvas.width / 2, 10);
            ctx.fillText(`CPU: ${score.cpu}`, canvas.width / 2, canvas.height - 20);
            if (score.player == score.cpu) {
                alert("Player wins!");
            } else if (score.cpu > score.player) {
                alert("CPU wins!");
            } else {
                alert("It's a tie!");
            }
            requestAnimationFrame(draw);
        }, 16);
    </script>
</body>
</html>
