<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="400" height="400"></canvas>
    <script>
        let paddle1 = {
            x: 100,
            y: 200,
            width: 10,
            height: 100,
            speed: 2
        };
        let paddle2 = {
            x: 300,
            y: 200,
            width: 10,
            height: 100,
            speed: 2
        };
        let ball = {
            x: 200,
            y: 200,
            width: 10,
            height: 10,
            speed: 2
        };
        let score1 = 0;
        let score2 = 0;
        let gameRunning = false;

        let canvas = document.getElementById('pong');
        let ctx = canvas.getContext('2d');

        let keys = {
            'w': 'w',
            's': 's',
            'up': 'w',
            'down': 's'
        };

        canvas.addEventListener('keydown', handleKey, false);

        function drawPaddle1() {
            ctx.fillStyle = 'black';
            ctx.fillRect(paddle1.x, paddle1.y, paddle1.width, paddle1.height);
        }

        function drawPaddle2() {
            ctx.fillStyle = 'black';
            ctx.fillRect(paddle2.x, paddle2.y, paddle2.width, paddle2.height);
        }

        function drawBall() {
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.width / 2, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.width / 2, 0, 2 * Math.PI);
            ctx.fill();
        }

        function handleKey(event) {
            if (event.key in keys && event.key.toLowerCase() === keys[event.key]) {
                if (gameRunning) {
                    let newPaddlePosition = paddle1.x + Math.sin(Date.now() / 1000) * 20;
                    paddle1.x = newPaddlePosition;
                    if (newPaddlePosition < 0) {
                        paddle1.x = 100;
                    } else if (newPaddlePosition > 400) {
                        paddle1.x = 300;
                    }
                    paddle2.x = newPaddlePosition;
                }
            }
        }

        function update() {
            if (gameRunning) {
                ball.x += ball.speed;
                if (ball.x < 0 || ball.x > 390) {
                    ball.speed = -ball.speed;
                }
                if (ball.y < 0) {
                    score2++;
                    ball.y = 200;
                    ball.x = 200;
                } else if (ball.y > 390) {
                    score1++;
                    ball.y = 200;
                    ball.x = 200;
                }
                if (ball.x < paddle1.x + paddle1.width && ball.y > paddle1.y - ball.height) {
                    ball.x = paddle1.x + paddle1.width / 2;
                } else if (ball.y - ball.height < paddle1.y && ball.x > paddle1.x) {
                    ball.x = paddle1.x + paddle1.width / 2;
                }
                if (ball.x < paddle2.x + paddle2.width && ball.y > paddle2.y - ball.height) {
                    ball.x = paddle2.x + paddle2.width / 2;
                } else if (ball.y - ball.height < paddle2.y && ball.x > paddle2.x) {
                    ball.x = paddle2.x + paddle2.width / 2;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPaddle1();
            drawPaddle2();
            drawBall();
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Player 1: ' + score1, 10, 10);
            ctx.fillText('Player 2: ' + score2, canvas.width - 130, 10);
        }

        function reset() {
            ball.x = 200;
            ball.y = 200;
            paddle1.x = 100;
            paddle2.x = 300;
            score1 = 0;
            score2 = 0;
            gameRunning = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            draw();
        }

        document.addEventListener('keydown', reset, false);
        document.addEventListener('keyup', reset, false);
        setInterval(update, 16);

        function init() {
            if (Math.random() < 0.5) {
                score1 = 1;
                ball.x = 200;
                ball.y = 200;
                paddle1.x = 100;
                paddle2.x = 300;
            } else {
                score2 = 1;
                ball.x = 200;
                ball.y = 200;
                paddle1.x = 300;
                paddle2.x = 100;
            }
            gameRunning = true;
        }

        init();
    </script>
</body>
</html>
