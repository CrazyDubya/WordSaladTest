<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor</title>
    <style>
        /* Global Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .editor {
            display: flex;
            flex-direction: row;
            height: 600px;
        }
        .editor-pane {
            width: 50%;
            padding: 20px;
            border: 1px solid #ddd;
        }
        .preview-pane {
            width: 50%;
            padding: 20px;
            border: 1px solid #ddd;
        }
        .toolbar {
            background-color: #f9f9f9;
            border-bottom: 1px solid #ddd;
            padding: 10px;
            display: flex;
            flex-direction: row;
            align-items: center;
        }
        .toolbar button {
            margin-right: 10px;
        }
        .word-count {
            font-size: 14px;
            color: #666;
            margin-left: 10px;
        }
        /* Accessibility Styles */
        .high-contrast {
            background-color: #000;
            color: #fff;
        }
        .high-contrast .toolbar {
            background-color: #333;
        }
        /* Responsive Design */
        @media (max-width: 768px) {
            .editor {
                flex-direction: column;
            }
            .editor-pane, .preview-pane {
                width: 100%;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <button id="bold-btn">Bold</button>
            <button id="italic-btn">Italic</button>
            <button id="link-btn">Link</button>
            <button id="image-btn">Image</button>
            <span class="word-count" id="word-count">Word Count: 0</span>
            <button id="high-contrast-btn">High Contrast</button>
        </div>
        <div class="editor">
            <div class="editor-pane">
                <textarea id="editor" placeholder="Type your markdown here..."></textarea>
            </div>
            <div class="preview-pane">
                <div id="preview"></div>
            </div>
        </div>
    </div>
    <script>
        // Get elements
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const wordCount = document.getElementById('word-count');
        const highContrastBtn = document.getElementById('high-contrast-btn');
        const boldBtn = document.getElementById('bold-btn');
        const italicBtn = document.getElementById('italic-btn');
        const linkBtn = document.getElementById('link-btn');
        const imageBtn = document.getElementById('image-btn');

        // State management
        let markdown = '';
        let wordCountValue = 0;
        let highContrast = false;

        // Update preview and word count
        function updatePreview() {
            const markdownHtml = markdownToHtml(markdown);
            preview.innerHTML = markdownHtml;
            wordCountValue = markdown.split(' ').length;
            wordCount.textContent = `Word Count: ${wordCountValue}`;
        }

        // Convert markdown to HTML
        function markdownToHtml(markdown) {
            // Simple markdown parsing
            const html = markdown
                .replace(/__(.*?)__/g, '<strong>$1</strong>')
                .replace(/_(.*?)_/g, '<em>$1</em>')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>')
                .replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">');
            return html;
        }

        // Handle formatting buttons
        boldBtn.addEventListener('click', () => {
            const selection = editor.value.substring(editor.selectionStart, editor.selectionEnd);
            editor.value = editor.value.replace(selection, `__${selection}__`);
            updatePreview();
        });

        italicBtn.addEventListener('click', () => {
            const selection = editor.value.substring(editor.selectionStart, editor.selectionEnd);
            editor.value = editor.value.replace(selection, `_${selection}_`);
            updatePreview();
        });

        linkBtn.addEventListener('click', () => {
            const selection = editor.value.substring(editor.selectionStart, editor.selectionEnd);
            editor.value = editor.value.replace(selection, `[${selection}](https://example.com)`);
            updatePreview();
        });

        imageBtn.addEventListener('click', () => {
            const selection = editor.value.substring(editor.selectionStart, editor.selectionEnd);
            editor.value = editor.value.replace(selection, `![${selection}](https://example.com/image.jpg)`);
            updatePreview();
        });

        // Handle high contrast mode
        highContrastBtn.addEventListener('click', () => {
            highContrast = !highContrast;
            document.body.classList.toggle('high-contrast', highContrast);
        });

        // Handle editor input
        editor.addEventListener('input', () => {
            markdown = editor.value;
            updatePreview();
        });

        // Initialize
        updatePreview();
    </script>
</body>
</html>
