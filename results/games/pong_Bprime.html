<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            background-color: #000;
            font-family: monospace;
            text-align: center;
        }
        #pong-container {
            width: 600px;
            height: 400px;
            border: 1px solid #fff;
            margin: 40px auto;
            position: relative;
        }
        #score {
            color: #fff;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="pong-container">
        <canvas id="pong-canvas" width="600" height="400"></canvas>
        <div id="score">0 - 0</div>
    </div>
    <script>
        const canvas = document.getElementById('pong-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDiv = document.getElementById('score');

        let playerScore = 0;
        let cpuScore = 0;

        let playerPaddle = {
            x: 10,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            speed: 5
        };

        let cpuPaddle = {
            x: canvas.width - 20,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            speed: 5
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speedX: 5,
            speedY: 5
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'w') {
                playerPaddle.y -= playerPaddle.speed;
            } else if (e.key === 's') {
                playerPaddle.y += playerPaddle.speed;
            }
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
            ctx.fillRect(cpuPaddle.x, cpuPaddle.y, cpuPaddle.width, cpuPaddle.height);
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            scoreDiv.textContent = `${playerScore} - ${cpuScore}`;
        }

        function update() {
            // Move CPU paddle
            if (cpuPaddle.y + cpuPaddle.height / 2 < ball.y) {
                cpuPaddle.y += cpuPaddle.speed;
            } else if (cpuPaddle.y + cpuPaddle.height / 2 > ball.y) {
                cpuPaddle.y -= cpuPaddle.speed;
            }

            // Move ball
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Collision with walls
            if (ball.y < 0 || ball.y > canvas.height) {
                ball.speedY *= -1;
            }

            // Collision with paddles
            if (ball.x < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height) {
                ball.speedX *= -1;
            } else if (ball.x > cpuPaddle.x - ball.radius &&
                       ball.y > cpuPaddle.y &&
                       ball.y < cpuPaddle.y + cpuPaddle.height) {
                ball.speedX *= -1;
            }

            // Score
            if (ball.x < 0) {
                cpuScore++;
                ball.x = canvas.width / 2;
                ball.y = canvas.height / 2;
                ball.speedX *= -1;
            } else if (ball.x > canvas.width) {
                playerScore++;
                ball.x = canvas.width / 2;
                ball.y = canvas.height / 2;
                ball.speedX *= -1;
            }

            // Ensure paddles don't go off screen
            if (playerPaddle.y < 0) {
                playerPaddle.y = 0;
            } else if (playerPaddle.y > canvas.height - playerPaddle.height) {
                playerPaddle.y = canvas.height - playerPaddle.height;
            }

            if (cpuPaddle.y < 0) {
                cpuPaddle.y = 0;
            } else if (cpuPaddle.y > canvas.height - cpuPaddle.height) {
                cpuPaddle.y = canvas.height - cpuPaddle.height;
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
